<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Weather App</title>
        <link rel="stylesheet" href="style.css">
    </head>

    <body>

        <div class="card">
            <div class="search">
                <input type="text" placeholder="enter city name" spellcheck="false">
                <button><img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSyi_CVTmoL1ITHFxQkfLwvj93hcsgA1Olkhg&s"></button>
            </div>

            <div class="weather">
                <img src="https://cdn2.iconfinder.com/data/icons/weather-flat-14/64/weather06-512.png" class="weather-icon">
                <h1 class="temp">8°</h1>
                <h2 class="city">Heidelberg</h2>
                <div class="details">

                    <div class="col">
                        <img src="https://cdn-icons-png.freepik.com/512/9290/9290540.png">
                        <div>
                            <p class="humidity">52%</p>
                            <p>Humidity</p>
                        </div>
                    </div>

                    <div class="col">
                        <img src="https://cdn-icons-png.flaticon.com/512/2011/2011448.png">
                        <div>
                            <p class="wind">11 km/h</p>
                            <p>Wind Speed</p>
                        </div>
                    </div>

                </div>
            </div>
        </div>



        <script src="script.js"></script>
    </body>
</html>
