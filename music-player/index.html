<!DOCTYPE html>
<html lang="de">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Music Player</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="container">
            <div class="music-player">
                <nav>
                    <div class="circle">
                        <img src="https://cdn-icons-png.flaticon.com/512/8591/8591387.png"></img>
                    </div>
                    <div class="circle">
                        <img src="https://cdn-icons-png.flaticon.com/512/4254/4254068.png"></img>
                    </div>
                </nav>
                    <img src="https://cdn-images.dzcdn.net/images/cover/94bff33c052ea31184cd5df3e868954d/0x1900-000000-80-0-0.jpg" class="song-img"></img>
                    <h1>Hauseingang</h1>
                    <p>Pashanim</p>

                    <audio controls>
                        <source src="https://soundcloud.com/deutschraptop/pashanim-hauseingang?si=2b66ed9ea634451e8f5d2530c122e508&utm_source=clipboard&utm_medium=text&utm_campaign=social_sharing" type="audio/mpeg">
                    </audio>
                    <input type="range" value="0" id="progress">

                    <div class="controls">
                        <div></div>
                    </div>
            </div>
        </div>
    </body>
</html>
