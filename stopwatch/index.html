<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Timer UI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="stopwatch">
    <div class="overlay"></div> 
    <div class="displayTime">00:00:00</div>
    <div class="buttons">
        <button class="stop" onclick="watchStop()">■</button>
        <button class="play" onclick="watchStart()">▶</button>
        <button class="reset" onclick="watchReset()">↻</button>
    </div> 
</div>

  <script src="script.js"></script>
</body>
</html>
